name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        # Uses the pinned toolchain (lean-toolchain) and runs `lake build`, which also
        # elaborates the #eval / example smoke checks.
      - name: Audit trusted theorem roots
        run: ./scripts/check-lean-trust.sh
      - name: Replay retained kernel evidence
        run: lake test
      - name: Check reference process contract
        run: lake exe checkReferenceProcess
      - name: Check bounded process boundary
        run: lake exe checkBoundedProcess
      - name: Check generated differential profile
        run: lake exe checkGeneratedDifferential --self-test
      - name: Validate pinned generated differential campaign
        run: lake exe checkGeneratedDifferential --check-profile reference/flat-validation-empty-logic-v1.generated-differential-v1.json
      - name: Validate retained generated differential result
        run: lake exe checkGeneratedDifferential --check-result reference/flat-validation-empty-logic-v1.generated-differential-v1.json qualification/flat-validation-empty-logic-v1-rust-v1/generated-differential-v1.RESULT.json
