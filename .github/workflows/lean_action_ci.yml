name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        # Uses the pinned toolchain (lean-toolchain) and runs `lake build`, which also
        # elaborates the #eval / example smoke checks.
      - name: Audit trusted theorem roots
        run: ./scripts/check-lean-trust.sh
      - name: Replay retained kernel evidence
        run: lake test
      - name: Check reference process contract
        run: lake exe checkReferenceProcess
